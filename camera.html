<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Booth — Safarulla Kasmi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="photobooth-body">
  <nav class="nav">
    <a href="index.html" class="nav-back" aria-label="Back">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="7,1 3,5.5 7,10"/>
      </svg>
    </a>
  </nav>

  <main class="photobooth-page filter-none" id="boothRoot">
    <!-- Center: viewfinder + actions -->
    <div class="booth-center">
      <div class="booth-viewfinder" id="viewfinder">
        <video id="video" autoplay muted playsinline></video>
        <div class="countdown" id="countdown"></div>
        <div class="smile-hint" id="smileHint">Smile, please</div>
        <div class="flash" id="flash"></div>
        <div class="viewfinder-led" aria-hidden="true"></div>
        <div class="camera-error" id="cameraError" hidden>
          Camera blocked.<br>Allow access in browser settings.
        </div>
      </div>

      <div class="camera-actions">
        <button class="camera-btn primary" id="snapBtn">Capture</button>
      </div>
    </div>

    <!-- Middle-right: vertical filter list (styled like project list, smaller) -->
    <ul class="filter-list" id="filterPicker">
      <li><button class="filter-btn active" data-filter="none">Original</button></li>
      <li><button class="filter-btn" data-filter="dreamy">Dreamy</button></li>
      <li><button class="filter-btn" data-filter="cinematic">Cinematic</button></li>
      <li><button class="filter-btn" data-filter="film">Film</button></li>
      <li><button class="filter-btn" data-filter="sepia">Sepia</button></li>
      <li><button class="filter-btn" data-filter="bw">B&amp;W</button></li>
    </ul>

    <!-- Right: camera + polaroid slot -->
    <div class="booth-camera-wrap">
      <img src="images/camera.webp" alt="" class="booth-camera-img" aria-hidden="true">
      <div class="camera-flash" id="cameraFlash" aria-hidden="true"></div>
      <div class="polaroid-out" id="polaroidOut">
        <div class="polaroid-photo" id="polaroidPhoto"></div>
        <p class="polaroid-note" id="polaroidNote" contenteditable="true" spellcheck="false" data-placeholder="type here"></p>
      </div>
      <div class="polaroid-actions" id="polaroidActions">
        <button class="camera-btn primary" id="saveBtn">Download</button>
        <button class="camera-btn" id="retakeBtn">Retake</button>
      </div>
    </div>
  </main>

  <canvas id="canvas" hidden></canvas>
  <span class="capture-counter" id="captureCounter" aria-live="polite"></span>
  <script src="js/camera.js"></script>
</body>
</html>
